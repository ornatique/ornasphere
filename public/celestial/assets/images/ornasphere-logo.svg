<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OrnaSphere logo">
  <defs>
    <linearGradient id="orbBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3db7ff"/>
      <stop offset="55%" stop-color="#0f67d8"/>
      <stop offset="100%" stop-color="#062c88"/>
    </linearGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
